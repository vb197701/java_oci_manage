name: Sync Releases

on:
  schedule:
    - cron: "41 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-releases
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout self
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq gh

      - name: Authenticate gh
        run: |
          echo "${{ github.token }}" | gh auth login --with-token

      - name: Run sync
        env:
          UPSTREAM: semicons/java_oci_manage
          TARGET: ${{ github.repository }}
        run: |
          python3 scripts/sync_releases.py
