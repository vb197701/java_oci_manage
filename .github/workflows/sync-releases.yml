name: Sync Releases

on:
  schedule:
    - cron: "41 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-releases
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout self
        uses: actions/checkout@v4

      - name: Run sync
        env:
          UPSTREAM: semicons/java_oci_manage
          TARGET: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/sync_releases.py
