name: Sync Upstream

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout self
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/semicons/java_oci_manage.git || true
          git fetch --prune upstream +refs/heads/*:refs/remotes/upstream/*
          git fetch upstream --tags --force

      - name: Sync default branch (code only)
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git checkout "$DEFAULT_BRANCH"

          # 只合并代码变更，保留 .github/workflows
          git merge upstream/"$DEFAULT_BRANCH" --no-commit || true
          git checkout upstream/"$DEFAULT_BRANCH" -- .
          git checkout HEAD -- .github/workflows
          git add -A
          git commit --no-edit -m "Sync code from upstream (preserve workflows)"
          git push origin "$DEFAULT_BRANCH"

      - name: Sync tags
        run: |
          git push origin --tags --force
